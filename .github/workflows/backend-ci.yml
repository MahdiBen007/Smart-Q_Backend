name: Backend CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint-and-syntax:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer:v2
          extensions: mbstring, pdo, pdo_mysql, json, openssl, tokenizer, xml, ctype, fileinfo
          coverage: none

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Laravel Config Sanity
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: PHP Syntax Check
        run: |
          find app routes config database -name "*.php" -print0 | xargs -0 -n1 php -l

      - name: Run Tests
        env:
          APP_ENV: testing
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
        run: php artisan test --without-tty
